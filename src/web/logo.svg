<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#0a0a0a" />
  
  <!-- Film strip -->
  <rect x="10" y="15" width="80" height="70" rx="8" fill="#e94560" />
  
  <!-- Film frame -->
  <rect x="15" y="20" width="70" height="60" rx="6" fill="#0a0a0a" />
  
  <!-- Play button (triangle) -->
  <polygon points="42,35 42,65 62,50" fill="#ffffff" />
  
  <!-- Film holes - top -->
  <circle cx="20" cy="20" r="3" fill="#0a0a0a" />
  <circle cx="80" cy="20" r="3" fill="#0a0a0a" />
  
  <!-- Film holes - bottom -->
  <circle cx="20" cy="80" r="3" fill="#0a0a0a" />
  <circle cx="80" cy="80" r="3" fill="#0a0a0a" />
</svg>
