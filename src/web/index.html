<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>CineSwipe - Discover Movies</title>
  <link rel="stylesheet" href="/web/styles.css" />
  <link rel="manifest" href="/web/manifest.json" />
</head>
<body>
  <div id="app">
    <!-- Auth Screen -->
    <div id="auth-screen" class="screen active">
      <div class="logo">
        <span class="logo-icon">🎬</span>
        <h1>CineSwipe</h1>
        <p>Swipe. Discover. Repeat.</p>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Login</button>
        <button class="auth-tab" data-tab="register">Register</button>
      </div>
      <form id="login-form" class="auth-form">
        <input type="email" id="login-email" placeholder="Email" required />
        <input type="password" id="login-password" placeholder="Password" required />
        <button type="submit" class="btn-primary">Login</button>
      </form>
      <form id="register-form" class="auth-form hidden">
        <input type="email" id="register-email" placeholder="Email" required />
        <input type="password" id="register-password" placeholder="Password (8+ chars)" minlength="8" required />
        <button type="submit" class="btn-primary">Create Account</button>
      </form>
      <div id="auth-error" class="error-msg hidden"></div>
      <div id="auth-success" class="success-msg hidden"></div>
    </div>

    <!-- Main Discovery Screen -->
    <div id="discovery-screen" class="screen">
      <header class="header">
        <span class="user-email" id="user-email"></span>
        <button id="logout-btn" class="btn-text">Logout</button>
      </header>
      
      <div class="deck-container" id="deck-container">
        <!-- Card Stack -->
        <div class="card-stack" id="card-stack"></div>
        
        <!-- Loading Skeleton -->
        <div id="loading-skeleton" class="skeleton-stack hidden">
          <div class="skeleton-card"></div>
        </div>
        
        <!-- Empty State -->
        <div id="empty-state" class="empty-state hidden">
          <span class="empty-icon">🎭</span>
          <h2>No More Movies</h2>
          <p>You've seen everything in this profile. Try another!</p>
          <button id="refresh-btn" class="btn-secondary">Refresh Deck</button>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="action-bar" id="action-bar">
        <button class="action-btn dismiss" data-action="dismiss" title="Not for me">
          <span class="action-icon">✕</span>
        </button>
        <button class="action-btn flip" id="flip-btn" title="Show details">
          <span class="action-icon">↻</span>
        </button>
        <button class="action-btn watchlist" data-action="watchlist" title="Add to watchlist">
          <span class="action-icon">♥</span>
        </button>
        <button class="action-btn log" data-action="log" title="Log as watched">
          <span class="action-icon">✓</span>
        </button>
      </div>

      <!-- Profile Selector -->
      <div class="profile-selector" id="profile-selector">
        <button class="profile-btn" id="profile-btn">
          <span id="current-profile">Gold Standard</span>
          <span class="chevron">▼</span>
        </button>
      </div>

      <!-- Profile Dropdown -->
      <div id="profile-dropdown" class="profile-dropdown hidden">
        <div class="profile-options" id="profile-options"></div>
      </div>

      <!-- Sync Overlay -->
      <div id="sync-overlay" class="sync-overlay hidden">
        <div class="sync-spinner"></div>
        <span>Syncing...</span>
      </div>
    </div>
  </div>

  <script type="module" src="/web/app.js"></script>
</body>
</html>
