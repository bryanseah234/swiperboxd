<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" type="image/svg+xml" href="/web/logo.svg" />
  <link rel="apple-touch-icon" href="/web/logo.svg" />
  <title>Swiperboxd - Discover Movies</title>
  <link rel="stylesheet" href="/web/styles.css" />
  <link rel="manifest" href="/web/manifest.json" />
</head>
<body>
  <div id="app">
    <!-- Auth Screen -->
    <div id="auth-screen" class="screen active">
      <div class="logo">
        <img src="/web/logo.svg" alt="Swiperboxd Logo" class="logo-img" />
        <h1>Swiperboxd</h1>
        <p>Swipe. Discover. Repeat.</p>
      </div>

      <form id="letterboxd-login-form" class="auth-form">
        <input type="text" id="letterboxd-username" placeholder="Your Letterboxd username" autocomplete="username" required />
        <textarea id="letterboxd-session-cookie" placeholder="Paste letterboxd.session cookie value here" rows="6" required autocomplete="off"></textarea>
        <button type="submit" class="btn-primary">Connect</button>
      </form>
      <div id="auth-error" class="error-msg hidden"></div>
      <div id="auth-success" class="success-msg hidden"></div>
    </div>

    <!-- Main Discovery Screen -->
    <div id="discovery-screen" class="screen">
      <header class="header">
        <img src="/web/logo.svg" alt="Logo" class="header-logo" />
        <button class="profile-btn" id="profile-btn">
          <span id="current-profile">Choose a List</span>
          <span class="chevron">▼</span>
        </button>
        <div class="header-actions">
          <button id="refresh-lists-btn" class="btn-text header-refresh-btn" title="Refresh lists from Letterboxd">↻</button>
          <button id="logout-btn" class="btn-text">Disconnect</button>
        </div>
      </header>

      <!-- List Dropdown (anchored below header) -->
      <div id="profile-dropdown" class="profile-dropdown hidden">
        <div class="list-search-shell">
          <input id="list-search-input" class="list-search-input" type="text" placeholder="Search Letterboxd lists" />
        </div>
        <div class="profile-options" id="profile-options"></div>
      </div>

      <div class="deck-container" id="deck-container">
        <!-- Card Stack -->
        <div class="card-stack" id="card-stack"></div>

        <!-- Action Bar -->
        <div class="action-bar" id="action-bar">
          <button class="action-btn dismiss" id="btn-dismiss" title="Skip (←)">
            <span class="action-icon">✕</span>
          </button>
          <button class="action-btn flip" id="btn-flip" title="Details (Space)">
            <span class="action-icon">ℹ</span>
          </button>
          <button class="action-btn watchlist" id="btn-watchlist" title="Watchlist (→)">
            <span class="action-icon">+</span>
          </button>
          <button class="action-btn log" id="btn-log" title="Log (↑)">
            <span class="action-icon">★</span>
          </button>
        </div>

        <!-- Loading Skeleton -->
        <div id="loading-skeleton" class="skeleton-stack hidden">
          <div class="skeleton-card"></div>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="empty-state hidden">
          <span class="empty-icon">🎭</span>
          <h2>No More Movies</h2>
          <p>You've seen everything in this list. Try another!</p>
          <button id="refresh-btn" class="btn-secondary">Refresh Deck</button>
        </div>
      </div>

      <!-- Sync Overlay (shown during initial sync to block swiping) -->
      <div id="sync-overlay" class="sync-overlay hidden">
        <div class="sync-spinner"></div>
        <span id="sync-overlay-text">Syncing your Letterboxd data...</span>
        <span id="sync-overlay-detail" class="sync-detail"></span>
      </div>
    </div>
  </div>

  <script type="module" src="/web/app.js"></script>
</body>
</html>
