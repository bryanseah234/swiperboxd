<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineSwipe - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { font-size: 2.5em; color: #e94560; margin-bottom: 5px; }
        .logo p { color: #666; font-size: 0.9em; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: #f0f0f0;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s;
        }
        .tab.active { background: #e94560; color: white; }
        .tab:hover:not(.active) { background: #e0e0e0; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        input:focus { outline: none; border-color: #e94560; }
        .btn {
            width: 100%;
            padding: 14px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { background: #d63850; transform: translateY(-2px); }
        .btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .error, .success {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9em;
            display: none;
        }
        .error { background: #fee; color: #c33; }
        .success { background: #efe; color: #3c3; }
        .error.show, .success.show { display: block; }
        .loading { text-align: center; color: #666; margin-top: 10px; display: none; }
        .loading.show { display: block; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <h1> CineSwipe</h1>
            <p>Discover your next favorite movie</p>
        </div>

        <div class="tabs">
            <button class="tab active" id="loginTab">Login</button>
            <button class="tab" id="registerTab">Register</button>
        </div>

        <div class="error" id="error"></div>
        <div class="success" id="success"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" required placeholder="Your password">
            </div>
            <button type="submit" class="btn" id="loginBtn">Login</button>
            <div class="loading" id="loginLoading">Logging in...</div>
        </form>

        <form id="registerForm" style="display: none;">
            <div class="form-group">
                <label for="registerEmail">Email</label>
                <input type="email" id="registerEmail" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="registerPassword">Password</label>
                <input type="password" id="registerPassword" required minlength="8" placeholder="At least 8 characters">
            </div>
            <button type="submit" class="btn" id="registerBtn">Create Account</button>
            <div class="loading" id="registerLoading">Creating account...</div>
        </form>
    </div>

    <script>
        const API_BASE = window.location.origin;

        const loginTab = document.getElementById('loginTab');
        const registerTab = document.getElementById('registerTab');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const errorDiv = document.getElementById('error');
        const successDiv = document.getElementById('success');

        loginTab.addEventListener('click', () => {
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
            loginForm.style.display = 'block';
            registerForm.style.display = 'none';
            errorDiv.classList.remove('show');
            successDiv.classList.remove('show');
        });

        registerTab.addEventListener('click', () => {
            registerTab.classList.add('active');
            loginTab.classList.remove('active');
            registerForm.style.display = 'block';
            loginForm.style.display = 'none';
            errorDiv.classList.remove('show');
            successDiv.classList.remove('show');
        });

        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            successDiv.classList.remove('show');
        }

        function showSuccess(message) {
            successDiv.textContent = message;
            successDiv.classList.add('show');
            errorDiv.classList.remove('show');
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            const loading = document.getElementById('loginLoading');

            btn.disabled = true;
            loading.classList.add('show');

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail?.reason || 'Login failed');
                }

                localStorage.setItem('auth_token', data.access_token);
                localStorage.setItem('user_id', data.user_id);
                localStorage.setItem('user_email', data.email);

                showSuccess('Login successful! Redirecting...');
                setTimeout(() => { window.location.href = '/'; }, 1000);

            } catch (err) {
                showError(err.message);
            } finally {
                btn.disabled = false;
                loading.classList.remove('show');
            }
        });

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const btn = document.getElementById('registerBtn');
            const loading = document.getElementById('registerLoading');

            btn.disabled = true;
            loading.classList.add('show');

            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail?.reason || 'Registration failed');
                }

                const loginResponse = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const loginData = await loginResponse.json();

                if (!loginResponse.ok) {
                    throw new Error('Account created but login failed. Please login manually.');
                }

                localStorage.setItem('auth_token', loginData.access_token);
                localStorage.setItem('user_id', loginData.user_id);
                localStorage.setItem('user_email', loginData.email);

                showSuccess('Account created! Redirecting...');
                setTimeout(() => { window.location.href = '/'; }, 1000);

            } catch (err) {
                showError(err.message);
            } finally {
                btn.disabled = false;
                loading.classList.remove('show');
            }
        });

        if (localStorage.getItem('auth_token')) {
            window.location.href = '/';
        }
    </script>
</body>
</html>
