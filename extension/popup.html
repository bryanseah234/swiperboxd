<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Swiperboxd Sync</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101010;
      --fg: #f5f5f5;
      --muted: #9a9a9a;
      --accent: #ff8000;
      --border: rgba(255,255,255,0.09);
    }
    html, body { margin: 0; padding: 0; }
    body {
      width: 320px;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
    }
    header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
    }
    h1 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0.02em;
    }
    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
    }
    section {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    section:last-child { border-bottom: none; }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 4px 0;
    }
    .row .label { color: var(--muted); }
    .row .value { color: var(--fg); font-variant-numeric: tabular-nums; }
    .dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      margin-right: 6px; background: #666; vertical-align: middle;
    }
    .dot.ok { background: #3ecf7a; }
    .dot.warn { background: #e6b800; }
    .dot.err { background: #e04f4f; }
    button {
      width: 100%;
      padding: 8px 10px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
    }
    button.secondary {
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border);
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .progress {
      height: 4px;
      background: rgba(255,255,255,0.07);
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.3s ease;
    }
    .log {
      margin-top: 8px;
      font-size: 11px;
      color: var(--muted);
      max-height: 60px;
      overflow: auto;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      line-height: 1.4;
    }
    label.auto {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 11px;
      margin-top: 8px;
    }
    input[type="text"] {
      width: 100%;
      padding: 6px 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--fg);
      border-radius: 4px;
      font-size: 12px;
      box-sizing: border-box;
    }
    .field { margin: 6px 0; }
    .field .k { color: var(--muted); font-size: 11px; margin-bottom: 2px; }
  </style>
</head>
<body>
  <header>
    <h1>Swiperboxd Sync</h1>
    <div class="subtitle">Scrape your own Letterboxd via your browser session.</div>
  </header>

  <section>
    <div class="row">
      <span class="label"><span id="lb-dot" class="dot"></span>Letterboxd session</span>
      <span id="lb-status" class="value">Checking…</span>
    </div>
    <div class="row">
      <span class="label"><span id="api-dot" class="dot"></span>Swiperboxd auth</span>
      <span id="api-status" class="value">—</span>
    </div>
  </section>

  <section id="config-section">
    <div class="field">
      <div class="k">API base URL</div>
      <input type="text" id="api-base" placeholder="https://swiperboxd.vercel.app" />
    </div>
    <div class="field">
      <div class="k">Swiperboxd username</div>
      <input type="text" id="username" placeholder="letterboxd-username" />
    </div>
    <div class="field">
      <div class="k">Session token</div>
      <input type="text" id="session-token" placeholder="paste from Swiperboxd login or use auto-detect" />
    </div>
    <button id="save-config" class="secondary">Save credentials</button>
  </section>

  <section>
    <div class="row">
      <span class="label">Phase</span>
      <span id="phase" class="value">idle</span>
    </div>
    <div class="row">
      <span class="label">Page</span>
      <span id="page" class="value">—</span>
    </div>
    <div class="row">
      <span class="label">Watchlist found</span>
      <span id="wl-count" class="value">0</span>
    </div>
    <div class="row">
      <span class="label">Diary found</span>
      <span id="diary-count" class="value">0</span>
    </div>
    <div class="progress"><div id="progress-fill" class="progress-fill"></div></div>
    <button id="start-btn">Start sync</button>
    <button id="stop-btn" class="secondary" disabled>Stop sync</button>
    <label class="auto">
      <input type="checkbox" id="auto-sync" />
      Auto-sync every 6 hours
    </label>
    <div id="log" class="log"></div>
  </section>

  <script src="popup.js"></script>
</body>
</html>
